name: Release

on:
  push:
    tags:
      - "[0-9]*.*.*"

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check tag matches Cargo.toml version
        run: |
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TAG="${{ github.ref_name }}"
          if [ "$CARGO_VERSION" != "$TAG" ]; then
            echo "::error::Tag '$TAG' does not match Cargo.toml version '$CARGO_VERSION'"
            echo "Fix: delete the tag, bump Cargo.toml, commit, then re-tag."
            exit 1
          fi
          echo "OK: tag and Cargo.toml both say $TAG"
      - name: Check formatting
        run: cargo fmt --check

  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      release_body: ${{ steps.cliff.outputs.content }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate release notes
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: changelog
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            archive: tar.gz
            use_cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl-tools (Linux musl x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Install cross (aarch64 Linux)
        if: matrix.use_cross == true
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo)
        if: matrix.use_cross != true
        run: cargo build --release --target ${{ matrix.target }}

      - name: Archive binary (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          ASSET="ubt-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          tar czf "$ASSET" -C "target/${{ matrix.target }}/release" ubt
          echo "ASSET=$ASSET" >> "$GITHUB_ENV"

      - name: Archive binary (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $asset = "ubt-${{ github.ref_name }}-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/ubt.exe" -DestinationPath $asset
          "ASSET=$asset" | Out-File -Append -FilePath $env:GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: ubt-${{ matrix.target }}
          path: ${{ env.ASSET }}

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [changelog, build]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Detect pre-release
        id: prerelease
        shell: bash
        run: |
          if echo "${{ github.ref_name }}" | grep -qE '-(alpha|beta|rc)'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body: ${{ needs.changelog.outputs.release_body }}
          draft: false
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
