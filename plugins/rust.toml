[plugin]
name = "rust"
description = "Rust projects"
homepage = "https://doc.rust-lang.org/"
install_help = "https://rustup.rs/"
default_variant = "cargo"

[detect]
files = ["Cargo.toml"]

[variants.cargo]
detect_files = ["Cargo.toml"]
binary = "cargo"

[commands]
"dep.install" = "{{tool}} fetch"
"dep.install_pkg" = "{{tool}} add {{args}}"
"dep.remove" = "{{tool}} remove {{args}}"
"dep.update" = "{{tool}} update {{args}}"
"dep.list" = "{{tool}} tree"
"dep.audit" = "{{tool}} audit"
"dep.lock" = "{{tool}} generate-lockfile"
build = "{{tool}} build"
start = "{{tool}} run"
test = "{{tool}} test"
lint = "{{tool}} clippy"
"lint.fix" = "{{tool}} clippy --fix --allow-dirty"
fmt = "{{tool}} fmt"
"fmt.check" = "{{tool}} fmt --check"
check = "{{tool}} check"
run = "{{tool}} run --bin {{args}}"
"run-file" = "rustc {{file}} && ./$(basename {{file}} .rs)"
exec = "{{tool}} run --example {{args}}"
clean = "{{tool}} clean"
publish = "{{tool}} publish"
release = "{{tool}} build --release"

[flags.test]
watch = "unsupported"
coverage = "unsupported"

[unsupported]
"dep.outdated" = "Use 'cargo-outdated': cargo install cargo-outdated && cargo outdated"
"dep.why" = "Use 'cargo tree -i <pkg>' to see reverse dependencies"
