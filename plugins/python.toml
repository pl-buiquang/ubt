[plugin]
name = "python"
description = "Python projects"
homepage = "https://docs.python.org/"
install_help = "https://www.python.org/downloads/"
default_variant = "pip"

[detect]
files = ["pyproject.toml", "requirements.txt", "setup.py", "setup.cfg"]

[variants.pip]
detect_files = ["requirements.txt", "setup.py", "setup.cfg"]
binary = "pip"

[variants.uv]
detect_files = ["uv.lock"]
binary = "uv"

[variants.poetry]
detect_files = ["poetry.lock"]
binary = "poetry"

[commands]
"dep.install" = "{{tool}} install -r requirements.txt"
"dep.install_pkg" = "{{tool}} install {{args}}"
"dep.remove" = "{{tool}} uninstall {{args}}"
"dep.list" = "{{tool}} list"
"dep.audit" = "{{tool}} audit"
build = "python -m build"
test = "python -m pytest"
lint = "python -m ruff check ."
"lint.fix" = "python -m ruff check --fix ."
fmt = "python -m ruff format ."
"fmt.check" = "python -m ruff format --check ."
run = "python -m {{args}}"
"run-file" = "python {{file}}"
clean = "sh -c 'find . -type d -name __pycache__ -exec rm -rf {} + && rm -rf .pytest_cache dist build *.egg-info'"
publish = "python -m twine upload dist/*"

[commands.variants.uv]
"dep.install" = "uv sync"
"dep.install_pkg" = "uv add {{args}}"
"dep.remove" = "uv remove {{args}}"
"dep.update" = "uv lock --upgrade"
"dep.list" = "uv pip list"
"dep.outdated" = "uv pip list --outdated"
build = "uv build"
test = "uv run pytest"
lint = "uv run ruff check ."
"lint.fix" = "uv run ruff check --fix ."
fmt = "uv run ruff format ."
"fmt.check" = "uv run ruff format --check ."
run = "uv run {{args}}"
"run-file" = "uv run python {{file}}"
publish = "uv publish"

[commands.variants.poetry]
"dep.install" = "poetry install"
"dep.install_pkg" = "poetry add {{args}}"
"dep.remove" = "poetry remove {{args}}"
"dep.update" = "poetry update {{args}}"
"dep.list" = "poetry show"
"dep.outdated" = "poetry show --outdated"
build = "poetry build"
test = "poetry run pytest"
lint = "poetry run ruff check ."
"lint.fix" = "poetry run ruff check --fix ."
fmt = "poetry run ruff format ."
"fmt.check" = "poetry run ruff format --check ."
run = "poetry run {{args}}"
"run-file" = "poetry run python {{file}}"
exec = "poetry run {{args}}"
publish = "poetry publish --build"

[flags.test]
coverage = "--cov"

[unsupported]
"dep.lock" = "Use 'pip freeze > requirements.txt' or 'poetry lock' directly."
"dep.update" = "Run `pip install --upgrade <pkg>` for specific packages."
"dep.outdated" = "Run `pip list --outdated`."
"dep.why" = "Use 'pipdeptree' directly: pip install pipdeptree && pipdeptree -r -p <pkg>"
