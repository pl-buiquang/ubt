schema_version = 1

[plugin]
name = "ruby"
description = "Ruby projects"
homepage = "https://www.ruby-lang.org/"
install_help = "https://www.ruby-lang.org/en/downloads/"
default_variant = "bundler"

[detect]
files = ["Gemfile"]

[variants.bundler]
detect_files = []
binary = "bundle"

[variants.rails]
detect_files = ["bin/rails"]
binary = "bundle"

[variants.gem]
detect_files = []
binary = "gem"

[commands]
"dep.install" = "{{tool}} install"
"dep.install_pkg" = "{{tool}} add {{args}}"
"dep.remove" = "{{tool}} remove {{args}}"
"dep.update" = "{{tool}} update {{args}}"
"dep.list" = "{{tool}} list"
"dep.outdated" = "{{tool}} outdated"
"dep.lock" = "{{tool}} lock"
build = "{{tool}} exec rake build"
test = "{{tool}} exec rake test"
lint = "{{tool}} exec rubocop"
"lint.fix" = "{{tool}} exec rubocop -a"
fmt = "{{tool}} exec rubocop -a"
"fmt.check" = "{{tool}} exec rubocop --format simple"
run = "{{tool}} exec {{args}}"
"run-file" = "ruby {{file}}"
exec = "{{tool}} exec {{args}}"
clean = "{{tool}} clean"
publish = "gem push pkg/*.gem"

[commands.variants.rails]
test = "{{tool}} exec rails test {{args}}"
start = "{{tool}} exec rails server"
build = "{{tool}} exec rails assets:precompile"
run = "{{tool}} exec rails {{args}}"
clean = "{{tool}} exec rails tmp:clear"
"db.migrate" = "{{tool}} exec rails db:migrate"
"db.rollback" = "{{tool}} exec rails db:rollback"
"db.seed" = "{{tool}} exec rails db:seed"
"db.create" = "{{tool}} exec rails db:create"
"db.drop" = "{{tool}} exec rails db:drop"
"db.reset" = "{{tool}} exec rails db:reset"
"db.status" = "{{tool}} exec rails db:migrate:status"

[commands.variants.gem]
"dep.install" = "gem install"
"dep.install_pkg" = "gem install {{args}}"
"dep.remove" = "gem uninstall {{args}}"
"dep.update" = "gem update {{args}}"
"dep.list" = "gem list"
"dep.outdated" = "gem outdated"

[unsupported]
"dep.audit" = "Use 'bundle-audit': gem install bundler-audit && bundle-audit check"
"dep.why" = "Use 'bundle viz' or 'bundle info <gem>' to trace dependencies"
